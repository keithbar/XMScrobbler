<!DOCTYPE html>
<html>
<head>
  <title>XM Scrobbler</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>XM <span>Scrobbler</span></h1>
      <p>Last.fm scrobbling for SiriusXM</p>
    </div>
    <div class="card">
      <h1>Scrobble from selected XM station.</h1>

      <a id="authStatus">Not logged in.</a>
      <button id="loginBtn">Login with Last.fm</button>

      <br><br>

      <div id="channelControls" style="display: none;">
        <label for="channelSelect">Select a station:</label>
        <select id="channelSelect"></select>
        <br><br>
        <label for="channelTimeout">Auto stop after:</label>
        <select id="channelTimeout">
          <option value="1">1 hour</option>
          <option value="2">2 hours</option>
          <option value="4">4 hours</option>
          <option value="8">8 hours</option>
          <option value="12">12 hours</option>
        </select>
        <button id="channelBtn">Start Scrobbling</button>
      </div>

      <p id="countdown"></p>
    </div>
  </div>

  
  
  <script src="/app.js"></script>

</body>
</html>
