<!DOCTYPE html>
<html>
<head>
  <title>Manual Scrobble Test</title>
</head>
<body>
  <h1>Test Scrobble</h1>

  <h2 id="authStatus">Not logged in.</h2>
  <button id="loginBtn">Login with Last.fm</button>

  <br><br>

  <form id="scrobbleForm" style="display: none;">
    <label>
      Artist:
      <input type="text" id="artist" required />
    </label>
    <br><br>

    <label>
      Track:
      <input type="text" id="track" required />
    </label>
    <br><br>

    <button type="submit">Submit</button>
  </form>

  <br><br>

  <div id="channelControls" style="display: none;">
    <select id="channel"></select>
    <button id="channelBtn">Start Scrobbling</button>
  </div>
  
  <script>
    // State
    let isScrobbling = false;

    // Elements
    const authStatus = document.getElementById('authStatus');
    const loginBtn = document.getElementById('loginBtn');
    const manualScrobbleForm = document.getElementById('scrobbleForm');
    const channelControls = document.getElementById('channelControls');
    const channelSelect = document.getElementById('channel');
    const channelBtn = document.getElementById('channelBtn');

    // Init
    init();

    // Functions
    async function init(){
      await checkAuth();

      manualScrobbleForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const artist = document.getElementById('artist').value;
        const track = document.getElementById('track').value;

        const response = await fetch('/scrobble', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ artist, track })
        });

        const data = await response.json();
        console.log(data);
        alert('Submitted! Check server console.');
      });

      channelBtn.addEventListener('click', async () => {
        const channelId = channelSelect.value;
        if(!channelId){
          alert('Select a channel first');
          return;
        }

        if(!isScrobbling){
          await fetch('/api/scrobble/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channelId })
          });

          setScrobblingState(true);
        }
        else{
          await fetch('/api/scrobble/stop', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ channelId })
          });

          setScrobblingState(false);
        }

      });
    }

    function setScrobblingState(state){
      isScrobbling = state;
      channelBtn.textContent = state ? 'Stop Scrobbling' : 'Start Scrobbling';
      channelSelect.disabled = state;
    }

    async function loadChannels(){
      const response = await fetch('/api/channels');
      const channels = await response.json();

      channelSelect.innerHTML = '';

      channels.forEach(channel => {
        const option = document.createElement('option');
        option.value = channel.deeplink;
        option.textContent = `${channel.number} - ${channel.name}`;
        channelSelect.appendChild(option);
      });
    }

    function handleLogin(){
      window.location.href = '/auth/login';
    }

    async function handleLogout(){
      await fetch('/auth/logout', { method: 'POST' });
      setScrobblingState(false);
      await checkAuth();
    }
    
    async function checkAuth(){
      const response = await fetch('/api/auth-status');
      const data = await response.json();

      if(data.loggedIn){
        authStatus.textContent = `Logged in as ${data.username}`;
        loginBtn.textContent = 'Logout';
        loginBtn.onclick = handleLogout;
        channelControls.style.display = 'block';
        manualScrobbleForm.style.display = 'block';

        await loadChannels();
      }
      else{
        authStatus.textContent = 'Not logged in.';
        loginBtn.textContent = 'Login with Last.fm';
        loginBtn.onclick = handleLogin;
        channelControls.style.display = 'none';
        manualScrobbleForm.style.display = 'none';
      }
    }
</script>

</body>
</html>
